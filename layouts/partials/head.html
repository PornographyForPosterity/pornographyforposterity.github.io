<head>
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    <meta content="utf-8" http-equiv="encoding">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#000084" />
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.mainpagesubtitle }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    {{/* The theme's boot-animation JS is responsible for un-hiding
         body { visibility: hidden } from style.css. Without this fallback,
         anyone without JS (or whose JS errors before that point) sees a
         permanently blank page. */}}
    <noscript><style>body { visibility: visible; }</style></noscript>
</head>
